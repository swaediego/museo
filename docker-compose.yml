services:
  db:
    image: postgres:17-alpine
    container_name: postgres-spring-boot
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-Miguel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-museo_db}
    ports:
      - "${POSTGRES_PORT:-5332}:5432"
    volumes:
      - galeria_db_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-Miguel} -d ${POSTGRES_DB:-museo_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongodb:
    image: mongo:7
    container_name: mongodb-galeria
    restart: always
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB:-galeria_catalog}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-ai-service
    restart: always
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          memory: 4G
    entrypoint:
      - /bin/sh
      - -c
      - "ollama serve & sleep 5 && ollama pull llama3 && wait"

  backend:
    build: .
    container_name: galeria-app-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
      mongodb:
        condition: service_started
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-museo_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-Miguel}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-password}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/${MONGO_DB:-galeria_catalog}
      - OLLAMA_URL=http://ollama-ai-service:11434/api/generate

  # Frontend Next.js (opcional: comentá este bloque si preferís correrlo con npm run dev)
  frontend:
    build:
      context: ../galeria-art-frontend
      dockerfile: Dockerfile
    container_name: galeria-app-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  galeria_db_data:
  mongodb_data:
  ollama_data:
